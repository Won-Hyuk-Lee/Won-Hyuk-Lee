<svg
    width="350"
    height="170"
    viewBox="0 0 350 170"
    version="1.1"
    xmlns="http://www.w3.org/2000/svg"
    aria-labelledby="title desc"
    role="img"
>
    <title id="title">Baekjoon badge for lwhprt12</title>
    <desc id="desc">Platinum 5, rate 1603, solved 671, class 4</desc>
    <style type="text/css"><![CDATA[
        .background {
            fill: url(#grad);
        }
        text {
            fill: white;
            font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        }
        text.boj-handle {
            font-weight: 700;
            font-size: 1.45em;
        }
        text.tier-text {
            font-weight: 700;
            font-size: 1.45em;
            opacity: 0.55;
        }
        .subtitle {
            font-weight: 500;
            font-size: 0.9em;
        }
        .value {
            font-weight: 400;
            font-size: 0.9em;
        }
        .percentage {
            font-weight: 300;
            font-size: 0.8em;
        }
        .progress {
            font-size: 0.7em;
        }
    ]]></style>
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="35%">
            <stop offset="10%" style="stop-color:#8CC584;stop-opacity:1" />
            <stop offset="55%" style="stop-color:#45B2D3;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#51A795;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="350" height="170" rx="10" ry="10" class="background" />
    <text x="315" y="50" class="tier-text" text-anchor="end">Platinum5</text>
    <text x="35" y="50" class="boj-handle">lwhprt12</text>
    <g>
