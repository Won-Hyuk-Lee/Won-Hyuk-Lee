    </g>
    <line x1="35" y1="142" x2="40.1" y2="142" stroke-width="4" stroke="floralwhite" stroke-linecap="round" />
    <line x1="35" y1="142" x2="290" y2="142" stroke-width="4" stroke-opacity="0.4" stroke="floralwhite" stroke-linecap="round" />
    <text x="297" y="142" alignment-baseline="middle" class="percentage">2%</text>
